services:

  blanddudeswebsite:
    # locate the Dockerfile in the current directory and build the image
    build: .
    # installs the php image and apache server to base the container on
    image: php:8.2-apache
    # names the container to be custom rather than autogenerated
    container_name: blanddudeswebsite
    ports:
        # maps environment variable PORT to port 80 in the container
      - "${PORT}:80"
      # upon conatiner termination, it will always attempt to restart unless docker is stopped
    restart: unless-stopped
  sshtest-server:
    build: ./ssh
    container_name: BACTA-ssh
    ports:
      - "${PORT}:22"
    restart: unless-stopped
