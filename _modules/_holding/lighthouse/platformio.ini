; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; --- Common Settings ---
[common]
framework = arduino
lib_deps = 
    knolleary/PubSubClient@^2.8
lib_extra_dirs = ~/Documents/Arduino/libraries
monitor_speed = 9600

; --- Adafruit Feather ESP32 ---
[env:featheresp32]
platform = espressif32
board = featheresp32
framework = ${common.framework}
lib_deps = ${common.lib_deps}
lib_extra_dirs = ${common.lib_extra_dirs}
monitor_speed = ${common.monitor_speed}

; --- Adafruit Feather RP2040 RFM95 ---
[env:adafruit_feather_rfm]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_feather_rfm
framework = arduino
lib_extra_dirs = ${common.lib_extra_dirs}
monitor_speed = ${common.monitor_speed}
lib_deps = 
    ${common.lib_deps}
    adafruit/Adafruit TinyUSB Library ; Required for RP2040 USB support
    ; adafruit/RadioHead @ ^1.120 ; Uncomment if using the LoRa radio